//route.proto

syntax = "proto3";

package gridflow;

option go_package = "gridflow/shared/proto/gen";

message LatLng {
  double latitude = 1;
  double longitude = 2;
}

message RouteCommand {
  string vehicle_id = 1;
  string message = 2;
  repeated LatLng waypoints = 3;
  int64 issued_at = 4;
  string reason = 5;
}